<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlanner - Planos de Aula</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">SmartPlanner</span>
            <div>
                <button class="btn btn-outline-light me-2" id="nav-listar">Listar Planos</button>
                <button class="btn btn-primary" id="nav-cadastrar">Novo Plano</button>
            </div>
        </div>
    </nav>

    <div class="container position-relative">
        
        <div id="ai-loading" class="d-none">
            <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status"></div>
            <h4 class="text-white mt-3 fw-bold">A IA está pensando...</h4>
        </div>

        <div id="tela-listagem">
            <div class="card shadow-sm mb-4 border-0">
                <div class="card-body">
                    <h5 class="card-title text-secondary">Filtros e Busca</h5>
                    <form id="form-filtros" class="row g-3">
                        <div class="col-md-3">
                            <input type="text" id="busca-titulo" class="form-control" placeholder="Buscar por Título...">
                        </div>
                        <div class="col-md-2">
                            <input type="text" id="filtro-disciplina" class="form-control" placeholder="Disciplina">
                        </div>
                        <div class="col-md-2">
                            <input type="text" id="filtro-tags" class="form-control" placeholder="Tags">
                        </div>
                        <div class="col-md-2">
                            <input type="date" id="filtro-data" class="form-control" title="Data Prevista">
                        </div>
                        <div class="col-md-2">
                            <select id="ordenar-por" class="form-select">
                                <option value="data_cadastro-desc">Mais Recentes</option>
                                <option value="titulo-asc">Título (A-Z)</option>
                            </select>
                        </div>
                        <div class="col-md-1 d-grid">
                            <button type="submit" class="btn btn-secondary">Filtrar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="table-responsive bg-white rounded shadow-sm">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Título</th>
                            <th>Disciplina</th>
                            <th>Data Prevista</th>
                            <th>Tags</th>
                            <th class="text-end">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        </tbody>
                </table>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span id="info-paginacao" class="text-muted">Mostrando página 1 de 1</span>
                <div class="btn-group">
                    <button class="btn btn-outline-secondary btn-sm" id="btn-ant">Anterior</button>
                    <button class="btn btn-outline-secondary btn-sm" id="btn-prox">Próxima</button>
                </div>
            </div>
        </div>

        <div id="tela-formulario" class="d-none">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom-0 d-flex justify-content-between align-items-center pt-3 pb-0">
                    <h4 class="mb-0 text-primary fw-bold" id="form-titulo-tela">Cadastrar Novo Plano</h4>
                    <button type="button" class="btn btn-warning fw-bold text-dark shadow-sm" id="btn-ia">
                        ✨ Gerar Recomendações com IA
                    </button>
                </div>
                <div class="card-body">
                    <form id="form-plano">
                        <input type="hidden" id="plano-id">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Título da Aula *</label>
                                <input type="text" class="form-control" id="titulo" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Disciplina *</label>
                                <input type="text" class="form-control" id="disciplina" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Data Prevista *</label>
                                <input type="date" class="form-control" id="data_prevista" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Ementa/Resumo *</label>
                                <textarea class="form-control" id="ementa" rows="2" required></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Objetivo *</label>
                                <textarea class="form-control" id="objetivo" rows="2" required></textarea>
                            </div>
                            
                            <hr class="mt-4 mb-2">
                            <h6 class="text-muted">Conteúdos e Recomendações</h6>
                            
                            <div class="col-12">
                                <label class="form-label">Conteúdos Complementares</label>
                                <textarea class="form-control border-warning bg-warning bg-opacity-10" id="conteudos" rows="3" required></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Recursos de Apoio (Tópicos relacionados)</label>
                                <textarea class="form-control border-warning bg-warning bg-opacity-10" id="recursos_apoio" rows="2" required></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Tags Recomendadas</label>
                                <input type="text" class="form-control border-warning bg-warning bg-opacity-10" id="tags" placeholder="Ex: Redes, OSPF, Roteamento" required>
                            </div>
                        </div>
                        <div class="mt-4 d-flex justify-content-end">
                            <button type="button" class="btn btn-light border me-2" id="btn-cancelar">Cancelar</button>
                            <button type="submit" class="btn btn-success px-4">Salvar Plano</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
