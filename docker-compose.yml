services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartplanner-api
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      PORT: "5000"
      DATA_DIR: /data
      DATABASE_URL: sqlite:////data/planos_aula.db
      FLASK_DEBUG: "false"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      MAX_PER_PAGE: "${MAX_PER_PAGE:-100}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-2}"
      GUNICORN_THREADS: "${GUNICORN_THREADS:-4}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-120}"
    volumes:
      - smartplanner_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()"
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: smartplanner-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  smartplanner_data:
