name: Backend Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint:
    name: Python, YAML e Docker
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências do projeto e ferramentas de qualidade
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff yamllint

      - name: Validar sintaxe do backend
        run: python -m py_compile app.py

      - name: Executar Ruff
        run: ruff check app.py --line-length 120

      - name: Validar Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Validar YAML
        run: >-
          yamllint
          -d "{extends: default, rules: {line-length: {max: 120}, document-start: disable}}"
          docker-compose.yml
          linter.yml
